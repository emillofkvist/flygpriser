<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billiga Helgresor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      padding: 16px;
      max-width: 680px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    select#passengers {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #eee;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .weekend-block { margin-bottom: 24px; }
    .weekend-heading {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid #2a2a2a;
    }
    .weekend-heading.current { color: #4caf50; }
    .weekend-heading.next { color: #888; }
    .period-block { margin-bottom: 16px; }
    .period-label {
      font-size: 11px;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .flight-row {
      background: #1a1a1a;
      border-radius: 7px;
      padding: 9px 12px;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }
    .flight-row:hover { background: #222; }
    .flight-row.cheapest { border-left: 3px solid #4caf50; }
    .flight-info { flex: 1; }
    .flight-destination {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .flight-times {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .flight-leg {
      font-size: 11px;
      color: #aaa;
    }
    .flight-leg b { color: #ddd; }
    .flight-leg .meta { color: #666; }
    .flight-price {
      text-align: right;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .flight-price .amount {
      font-weight: 700;
      font-size: 15px;
    }
    .flight-price .amount.cheapest-price { color: #4caf50; }
    .flight-price .label {
      font-size: 10px;
      color: #555;
    }
    .loading {
      color: #666;
      font-size: 12px;
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #333;
      border-top-color: #4caf50;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #e57373; font-size: 12px; padding: 6px 0; }
    .no-results { color: #555; font-size: 12px; padding: 6px 0; }
    .data-note {
      margin-top: 24px;
      font-size: 10px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>&#x2708; Billiga Helgresor</h1>
    <select id="passengers">
      <option value="1a">&#x1F464; 1 vuxen</option>
      <option value="2a">&#x1F46B; 2 vuxna</option>
      <option value="2a1c">2 vuxna + 1 barn (2019)</option>
      <option value="2a2c" selected>2 vuxna + 2 barn (2019, 2012)</option>
    </select>
  </div>

  <div id="results"></div>

  <p class="data-note">Priser fr&#xe5;n MMX, AGH och CPH &middot; Via Aviasales/Travelpayouts &middot; Cachat data, ej realtid</p>

  <script src="config.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
